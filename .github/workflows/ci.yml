name: ci

# Pre-merge checks: run on every PR and on pushes to main. Catches build/test
# breakage before a release tag is cut (release.yml only runs on `v*` tags).
#
# NOTE: this org restricts third-party actions to an allow-list. We therefore
# use only `actions/*` (GitHub-owned) actions and otherwise drive the runner's
# preinstalled toolchains (rustup/cargo, node/npm) directly via `run:`.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri's Rust crate needs the WebKitGTK / GTK system libraries to build
      # on Linux, same as the release job.
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      # rustup is preinstalled on GitHub-hosted runners; just pin stable and add
      # the components we need (replaces dtolnay/rust-toolchain).
      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt clippy
          rustup default stable
          rustc --version && cargo --version

      # Cargo registry + build cache (replaces swatinem/rust-cache with the
      # GitHub-owned actions/cache). Keyed on the lockfile; falls back to the
      # newest partial cache for the same OS.
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # pdfium is loaded at runtime by the shtuka-core PDF tests / the app; fetch
      # the same pinned build the release uses so a compile that links it works.
      - name: Fetch pdfium
        run: |
          mkdir -p src-tauri/resources
          curl -sL -o pdfium.tgz "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7763/pdfium-linux-x64.tgz"
          tar xzf pdfium.tgz lib/libpdfium.so
          mv lib/libpdfium.so src-tauri/resources/libpdfium.so

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  frontend:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      # `npm run build` runs `tsc` (type check) then `vite build`.
      - name: Build (type check + bundle)
        run: npm run build
